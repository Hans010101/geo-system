name: Refresh Binance Square Cookie

# Refreshes the 币安广场 AWS WAF cookie into the production DB (sysConfigs) every 2h. Uses a GitHub-hosted
# runner (has Chromium) + a minimal-privilege Service Account (roles/cloudsql.client) via cloud-sql-proxy,
# writing as a scoped MySQL user (cookie_writer, SELECT/INSERT/UPDATE on sysConfigs only). No public DB
# exposure, no root password. Cookie TTL is 3h, so 2h cadence leaves ~1h buffer.

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch: {}

concurrency:
  group: refresh-binance-cookie
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        run: npm install -g pnpm@10.4.1

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Install Chromium (matching playwright-core)
        run: pnpm exec playwright-core install --with-deps chromium

      # Proxy + refresh MUST run in ONE step: a `&` background process from a prior step does NOT
      # reliably survive into the next step's fresh shell → the refresh script hit
      # ECONNREFUSED 127.0.0.1:3307 on its first query (root cause of the stale-cookie failures).
      - name: Start proxy + refresh cookie
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          # scoped user (cookie_writer) — password is a GitHub secret; hex, URL-safe
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          # Skip GREEN (not red) when the required secrets aren't configured yet — avoids failing every
          # 2h with a red ✗ while GCP_SA_KEY/DB_PASSWORD are still pending. Auto-activates once both are set.
          if [ -z "${GCP_SA_KEY:-}" ] || [ -z "${DB_PASSWORD:-}" ]; then
            echo "::warning::GCP_SA_KEY / DB_PASSWORD 未配置 — 跳过币安 cookie 刷新(配置这两个 secret 后自动生效)"
            exit 0
          fi
          set -euo pipefail
          export DATABASE_URL="mysql://cookie_writer:${DB_PASSWORD}@127.0.0.1:3307/geo_system"
          curl -sSL -o cloud-sql-proxy https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.14.0/cloud-sql-proxy.linux.amd64
          chmod +x cloud-sql-proxy
          printf '%s' "$GCP_SA_KEY" > /tmp/sa-key.json
          ./cloud-sql-proxy gen-lang-client-0869327408:asia-northeast1:geo-system-db \
            --port 3307 --credentials-file=/tmp/sa-key.json &
          PROXY_PID=$!
          trap 'kill "$PROXY_PID" 2>/dev/null || true; rm -f /tmp/sa-key.json' EXIT
          # wait (up to 30s) for the proxy to actually accept connections; fail loudly if it never does
          ready=0
          for i in $(seq 1 30); do
            if (echo > /dev/tcp/127.0.0.1/3307) 2>/dev/null; then ready=1; break; fi
            kill -0 "$PROXY_PID" 2>/dev/null || { echo "cloud-sql-proxy exited early"; exit 1; }
            sleep 1
          done
          [ "$ready" = "1" ] || { echo "cloud-sql-proxy not ready after 30s"; exit 1; }
          pnpm exec tsx refresh-binance-cookie.ts
